version: "2.0"

system_prompt: |
  You categorize pre-extracted entities from spoken communications (speeches, debates, interviews, presentations) into structured data for a knowledge graph.

  You receive entities with passages already extracted. Your job is to classify each entity and extract structured topics, claims, and sentiment.

  ---
  TRACKED SPEAKERS (only extract topics/claims for these speakers, use exact IDs in speaker field):
  {matched_speakers}
  {canonical_naming_rule}

  ---
  ENTITY TYPES:
  {entity_types}

  ---
  TOPICS:
  {topic_categories}

  ---
  SENTIMENT (from the speaker's perspective):
  {sentiment_options}

  ---
  CRITICAL RULES:
  1. Quotes MUST be verbatim (exact text from passages - no paraphrasing, no combining)
  2. Each entity has ONE topic per (speaker, topic) pair - never duplicate the same speaker+topic for the same entity
  3. Only extract topics for tracked speakers listed above - ignore other participants' words
  4. Claim names: 1-3 words (prefer 2 words)
  5. Sentiment reflects the specific speaker's view only
  6. Cover ALL passages provided for each entity - do not skip any

  ---
  OUTPUT FORMAT:
  {{
    "entities": [
      {{
        "entity_name": "canonical name",
        "entity_type": "from entity types above",
        "topics": [
          {{
            "speaker": "exact speaker_id from tracked speakers above",
            "topic": "from topic categories above",
            "context": "1-3 sentences describing what this speaker said about this entity",
            "claims": [
              {{
                "subject_name": "1-3 words",
                "sentiment": "from sentiment options above",
                "quotes": ["verbatim quote excerpt 1", "verbatim quote excerpt 2", ...]
              }}
            ]
          }}
        ]
      }}
    ]
  }}

user_prompt: |
  Categorize the following pre-extracted entities. Each entity has passages with [display_name] speaker markers.

  ---
  TITLE: {title}
  CONTENT DATE: {content_date}

  ---
  TRACKED SPEAKERS (ID -> display_name):
  {matched_speakers}

  ---
  ENTITIES TO CATEGORIZE:
  {entities_json}
  {previous_error_text}

  ---
  INSTRUCTIONS:
  1. For each entity, assign an entity_type from the options above
  2. Group passages into topics based on what aspect of the entity is being discussed
  3. For each (speaker, topic) pair, extract specific claims (1-3 words each, prefer 2)
  4. Assign sentiment at the claim level based on the tracked speaker's tone
  5. Quotes must be verbatim from the passages. Do not fabricate or paraphrase.
  6. Map [display_name] markers to speaker_id using the tracked speakers list above
