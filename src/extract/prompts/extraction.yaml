version: "3.0"

# Phase 1: Speaker-entity attribution — which entities each matched speaker substantively discusses
entity_system_prompt: |
  You identify SPECIFIC ENTITIES substantively discussed by specific tracked speakers in spoken communications (content type: {content_type}) for a knowledge graph.

  ---
  TRACKED SPEAKERS:
  {matched_speakers}

  ---
  RULES:
  1. CANONICAL NAMES (CRITICAL — entity names flow into downstream stages):
     - People: always use full official name (Smith → John Smith; Mr. Doe → Jane Doe)
     - Organizations: drop legal suffixes (Apple Inc. → Apple; Meta Platforms → Meta)
     - Never use titles, roles, or pronouns as the entity name — use full legal name even when the source refers to someone by role
  2. Identify SPECIFIC ENTITIES (Proper Nouns: specific people, companies, countries, organizations, or specific legislation). Do NOT invent broad abstract themes like "Economic Policy" or "Foreign Relations".
  3. The "Substantive Claim" Rule: You must ONLY extract an entity if the speaker makes a direct, substantive claim, opinion, or stance ABOUT THAT SPECIFIC ENTITY.
  4. The "Passing Example" Rule (CRITICAL): If an entity is just mentioned as a passing example to make a broader point, DO NOT extract it. 
     - Example: "Prices are down. Gasoline is $1.85. Beef is coming down." -> DO NOT extract Gasoline or Beef. The speaker is not making a claim about the beef industry; they are making a claim about inflation.
     - Example: "Look at the corrupt elections in Detroit and Atlanta." -> DO NOT extract Detroit or Atlanta. The speaker is not making a claim about city management; they are making a claim about election fraud.
  5. The "List" Rule: If a speaker lists 3 or 4 entities in a single breath, they are usually passing examples. Ignore them unless the speaker stops to make a specific claim about one of them.
  6. Each entity appears at most once per speaker — no duplicates.
  7. Cover the ENTIRE content — do not favor the beginning.
  8. If a tracked speaker does not discuss any entities, return an empty list for them.

  ---
  OUTPUT FORMAT:
  {{
    "speakers": [
      {{
        "speaker": "Speaker Name",
        "entities": ["Entity A", "Entity B", ...]
      }}
    ]
  }}

entity_user_prompt: |
  Identify specific entities substantively discussed by each tracked speaker in the following content.

  ---
  TRACKED SPEAKERS:
  {matched_speakers}

  ---
  CONTENT:
  {content}

  ---
  Return only specific entities each tracked speaker genuinely discusses. Omit speakers with no qualifying entities.

# Phase 2: Passage extraction — verbatim exchange per (speaker, entity) pair in a chunk
passage_system_prompt: |
  You extract structured passages from spoken communications (content type: {content_type}) for a knowledge graph.
  You are given per-speaker entity whitelists and a chunk of content.
  For each relevant (speaker, entity) pair you produce the verbatim exchange.

  ---
  TRACKED SPEAKERS AND THEIR ENTITIES:
  {speaker_entity_list}

  ---
  VERBATIM FIELD:
  Copy the surrounding exchange from the transcript. Rules:
  1. Always include the question or context that prompted the tracked speaker's response — never start mid-answer.
  2. Capture the full topically continuous exchange — brief interjections and affirmations do not break it.
  3. Mark every speaker change with their canonical name in brackets, e.g. [Donald Trump].
  4. Output clean English: use (inaudible) for unclear speech, join interrupted phrases, remove pure filler — but preserve the actual spoken content.
  5. Stop when the topic genuinely shifts to something else.

  ---
  CRITICAL RULES:
  1. Extract passages ONLY for (speaker, entity) pairs in the whitelist above. Do not invent speakers or entities.
  2. For each entity in the whitelist that appears in this chunk, extract the surrounding exchange. Phase 1 has already determined which entities qualify — do not skip or filter them.
  3. Assign each passage only to the entity it discusses. A passage about entity X does not belong under entity Y merely because both appear in the same chunk.
  4. Start a new passage only when the topic genuinely shifts or the entity reappears in a clearly different context.
  ---
  OUTPUT FORMAT:
  {{
    "speakers": [
      {{
        "speaker_name": "exact name from tracked speakers",
        "entities": [
          {{
            "entity_name": "exact name from that speaker's whitelist",
            "passages": [
              {{
                "verbatim": "[Interviewer] question [Tracked Speaker] full response..."
              }}
            ]
          }}
        ]
      }}
    ]
  }}

passage_user_prompt: |
  Extract passages for the following (speaker, entity) pairs from the content chunk below.
  If a speaker or entity from the whitelist is not discussed in this chunk, omit them from the output.

  ---
  TRACKED SPEAKERS AND THEIR ENTITIES:
  {speaker_entity_list}

  ---
  CONTENT CHUNK:
  {content}

  ---
  For each passage return the verbatim field (full surrounding exchange with [Speaker] markers).
